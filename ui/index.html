<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uki</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2a4a;
    -webkit-app-region: drag;
  }
  header h1 {
    font-size: 18px;
    color: #e94560;
    font-weight: 700;
  }
  header span {
    font-size: 11px;
    color: #8888aa;
  }
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  #output .user { color: #e94560; }
  #output .think { color: #00bcd4; }
  #output .tool  { color: #ffc107; }
  #output .result { color: #8888aa; font-size: 12px; }
  #output .reply { color: #4caf50; }
  footer {
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid #2a2a4a;
    background: #16213e;
  }
  #input {
    flex: 1;
    padding: 10px 14px;
    background: #0f3460;
    border: none;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
  }
  #input::placeholder { color: #555; }
  #send {
    padding: 10px 24px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.4; cursor: default; }
  .divider {
    color: #444;
    margin: 8px 0;
  }
</style>
</head>
<body>
<header>
  <h1>Uki</h1>
  <span id="model">加载中...</span>
</header>
<div id="output"></div>
<footer>
  <input id="input" type="text" placeholder="输入消息..." autofocus>
  <button id="send" onclick="send()">发送</button>
</footer>

<script>
const API = "http://127.0.0.1:8765";
const output = document.getElementById("output");
const input = document.getElementById("input");
const btn = document.getElementById("send");
let running = false;

async function init() {
  try {
    const r = await fetch(API + "/health");
    const d = await r.json();
    document.getElementById("model").textContent = d.model;
  } catch(e) {
    append("等待后端启动...\n", "result");
    setTimeout(init, 1000);
  }
}

function append(text, cls) {
  const span = document.createElement("span");
  span.className = cls || "";
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

async function send() {
  const msg = input.value.trim();
  if (!msg || running) return;
  input.value = "";
  running = true;
  btn.disabled = true;

  append("▸ " + msg + "\n", "user");

  try {
    const res = await fetch(API + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // 解析 SSE 行
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const text = JSON.parse(line.slice(6));
          append(text + "\n", lineClass(text));
        }
      }
    }
  } catch (e) {
    append("[连接失败] " + e.message + "\n", "result");
  }

  append("\n");
  running = false;
  btn.disabled = false;
  input.focus();
}

function lineClass(text) {
  if (text.includes("思考")) return "think";
  if (text.includes("调用工具")) return "tool";
  if (text.includes("Uki:")) return "reply";
  if (text.includes("📋")) return "result";
  return "";
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

init();
</script>
</body>
</html>
