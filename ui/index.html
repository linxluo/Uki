<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Uki</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --input-bg: #16213e;
    --accent: #e94560; --text: #d0d0e0; --muted: #6a6a8a;
    --user-bubble: #e94560; --reply: #4caf50; --think: #00bcd4; --tool: #ffb74d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font:13px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text);
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  header {
    padding:12px 24px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid #222; background:var(--card); -webkit-app-region:drag;
  }
  header h1 { font-size:16px; color:var(--accent); font-weight:700; }
  header .right { display:flex; align-items:center; gap:10px; }
  header .status { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  header .dot { width:6px; height:6px; border-radius:50%; background:var(--reply); }

  /* 模式选择器 */
  .mode-bar {
    display:flex; gap:0; background:#0f0f1a; border-radius:8px; overflow:hidden; border:1px solid #2a2a4a;
  }
  .mode-btn {
    padding:5px 12px; font-size:12px; background:none; color:var(--muted);
    border:none; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .mode-btn:hover { color:#fff; background:#16213e; }
  .mode-btn.active { color:#fff; background:var(--accent); }
  .mode-btn:not(:last-child) { border-right:1px solid #2a2a4a; }

  /* 确认栏 */
  #confirmBar {
    display:none; padding:8px 24px; background:#16213e; border-bottom:1px solid var(--accent);
    align-items:center; gap:12px; font-size:13px;
  }
  #confirmBar.show { display:flex; }
  #confirmBar .msg { flex:1; color:var(--text); }
  #confirmBar .tool-name { color:var(--accent); font-weight:600; }
  #confirmBar button {
    padding:6px 18px; border:none; border-radius:6px; font-size:12px; cursor:pointer;
  }
  .btn-allow { background:var(--reply); color:#fff; }
  .btn-deny  { background:#444; color:var(--text); }
  #settingsBtn {
    padding:5px 14px; font-size:13px; background:none; color:var(--muted);
    border:1px solid #333; border-radius:6px; cursor:pointer; transition:.2s;
  }
  #settingsBtn:hover { color:#fff; border-color:var(--accent); }

  /* 聊天区 */
  #chat { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:85%; padding:10px 14px; border-radius:12px; line-height:1.6; word-break:break-word; animation:fadeIn .2s; }
  .msg.user { align-self:flex-end; background:var(--user-bubble); color:#fff; border-bottom-right-radius:3px; }
  .msg.think { align-self:flex-start; background:#162447; color:var(--think); font-size:12px; border-bottom-left-radius:3px; }
  .msg.tool  { align-self:flex-start; background:#1a1a1a; color:var(--tool); font-size:11px; padding:6px 10px; }
  .msg.reply { align-self:flex-start; background:#1b3a2a; color:var(--reply); border-bottom-left-radius:3px; }
  .msg.info  { align-self:center; color:var(--muted); font-size:11px; background:none; padding:2px 0; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  footer {
    padding:12px 24px; display:flex; gap:10px;
    border-top:1px solid #222; background:var(--card);
  }
  #input {
    flex:1; padding:10px 16px; background:var(--input-bg); border:1px solid #2a2a4a;
    border-radius:10px; color:var(--text); font-size:13px; outline:none; transition:border .2s;
  }
  #input:focus { border-color:var(--accent); }
  #input::placeholder { color:#444; }
  #send {
    padding:10px 22px; background:var(--accent); color:#fff; border:none;
    border-radius:10px; font-size:13px; cursor:pointer; font-weight:600; transition:opacity .2s;
  }
  #send:hover { opacity:.85; }
  #send:disabled { opacity:.35; cursor:default; }

  /* 设置模态栏 */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
    z-index:100; justify-content:center; align-items:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border-radius:14px; width:680px; max-height:80vh;
    display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .modal-header {
    padding:16px 24px; border-bottom:1px solid #222;
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-header h2 { font-size:15px; color:var(--text); }
  .modal-close {
    background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer;
  }
  .modal-close:hover { color:#fff; }
  .modal-body { display:flex; flex:1; overflow:hidden; }
  .modal-nav {
    width:170px; border-right:1px solid #222; padding:10px 0; overflow-y:auto;
  }
  .modal-nav .nav-item {
    padding:10px 20px; font-size:13px; color:var(--muted); cursor:pointer;
    transition:.15s; border-left:3px solid transparent;
  }
  .modal-nav .nav-item:hover, .modal-nav .nav-item.active {
    color:#fff; background:#16213e; border-left-color:var(--accent);
  }
  .modal-content { flex:1; padding:20px 28px; overflow-y:auto; }
  .modal-content .section { display:none; }
  .modal-content .section.active { display:block; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .field input, .field select {
    width:100%; padding:9px 12px; background:var(--input-bg); border:1px solid #2a2a4a;
    border-radius:8px; color:var(--text); font-size:13px; outline:none;
  }
  .field input:focus { border-color:var(--accent); }
  .field input[type="password"] { font-family:monospace; letter-spacing:2px; }
  .field .hint { font-size:11px; color:var(--muted); margin-top:2px; }
  .modal-footer {
    padding:14px 24px; border-top:1px solid #222;
    display:flex; justify-content:flex-end; gap:8px;
  }
  .modal-footer button {
    padding:8px 20px; border-radius:8px; font-size:13px; cursor:pointer; border:none;
  }
  .btn-cancel { background:#333; color:var(--text); }
  .btn-save { background:var(--accent); color:#fff; font-weight:600; }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--reply); color:#fff; padding:10px 28px; border-radius:8px;
    font-size:13px; opacity:0; transition:opacity .3s; z-index:200; pointer-events:none;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>Uki</h1>
  <div class="right">
    <div class="mode-bar" id="modeBar">
      <button class="mode-btn active" data-mode="default" title="写入文件前弹确认">默认</button>
      <button class="mode-btn" data-mode="auto" title="所有操作直接执行，不询问">自动</button>
      <button class="mode-btn" data-mode="readonly" title="可以读、搜、列，不能写文件">只读</button>
    </div>
    <div class="status"><span class="dot"></span><span id="model">连接中...</span></div>
    <button id="settingsBtn" onclick="openSettings()">设置</button>
  </div>
</header>

<div id="confirmBar">
  <span class="msg">Uki 想要执行 <span class="tool-name" id="confirmTool"></span></span>
  <button class="btn-allow" onclick="confirmAction(true)">允许</button>
  <button class="btn-deny" onclick="confirmAction(false)">拒绝</button>
</div>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="输入消息..." autofocus>
  <button id="send" onclick="send()">发送</button>
</footer>

<!-- 设置模态栏 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>设置</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-nav" id="modalNav">
        <div class="nav-item active" data-section="llm">LLM 配置</div>
        <div class="nav-item" data-section="context">上下文窗口</div>
      </div>
      <div class="modal-content" id="modalContent">
        <div class="section active" id="sec-llm"></div>
        <div class="section" id="sec-context"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存并重启</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://127.0.0.1:8765";
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("send");
let running = false;

// ==================== 聊天 ====================
async function init() {
  try {
    const r = await fetch(API + "/health");
    const d = await r.json();
    document.getElementById("model").textContent = d.model;
  } catch(e) {
    document.getElementById("model").textContent = "等待后端...";
    setTimeout(init, 1000);
  }
  initModeSelector();
}

// ==================== 模式切换 ====================
async function initModeSelector() {
  try {
    const r = await fetch(API + "/mode");
    const d = await r.json();
    setActiveMode(d.mode);
  } catch(e) {}

  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.onclick = async () => {
      const mode = btn.dataset.mode;
      await fetch(API + "/mode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode }),
      });
      setActiveMode(mode);
    };
  });
}

function setActiveMode(mode) {
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === mode);
  });
}

function bubble(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

let waitingConfirm = false;

async function send() {
  const msg = input.value.trim();
  if (!msg || running) return;
  input.value = "";
  running = true; btn.disabled = true;
  bubble(msg, "user");
  waitingConfirm = false;

  try {
    const res = await fetch(API + "/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ message: msg }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder(); let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = JSON.parse(line.slice(6));
        if (typeof data === "object" && data.type === "confirm") {
          showConfirm(data.tool);
          waitingConfirm = true;
          continue;  // 不退出循环，等确认后继续读 SSE
        }
        if (waitingConfirm) continue;  // 确认前的输出跳过
        if (!data.trim()) continue;
        bubble(data, msgClass(data));
      }
    }
  } catch(e) { bubble("连接失败: "+e.message, "info"); }
  running = false; btn.disabled = false; input.focus();
}

// ==================== 确认栏 ====================
let confirmMsg = "";

function showConfirm(tool) {
  document.getElementById("confirmTool").textContent = tool;
  document.getElementById("confirmBar").classList.add("show");
  confirmMsg = "";  // 暂存当前消息，确认后重新发送
}

function hideConfirm() {
  document.getElementById("confirmBar").classList.remove("show");
}

async function confirmAction(approved) {
  hideConfirm();
  waitingConfirm = false;
  await fetch(API + "/confirm", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ approved }),
  });
}
function msgClass(text) {
  if (text.includes("💭")) return "think";
  if (text.includes("🔧")) return "tool";
  if (text.includes("✨")||text.startsWith("Uki:")) return "reply";
  if (text.includes("📋")) return "info";
  return "info";
}
input.addEventListener("keydown", e => { if (e.key==="Enter") send(); });

// ==================== 设置 ====================
const LLM_KEYS = ["OPENAI_API_KEY","OPENAI_BASE_URL","OPENAI_MODEL"];
const CTX_KEYS = ["UKI_CONTEXT_WINDOW","UKI_CONTEXT_MAX","UKI_CONTEXT_TRIM","UKI_SUMMARY_THRESHOLD"];
let configCache = [];

async function openSettings() {
  document.getElementById("modalOverlay").classList.add("open");
  const res = await fetch(API + "/config");
  const data = await res.json();
  configCache = data.fields;

  renderSection("sec-llm", configCache.filter(f => LLM_KEYS.includes(f.key)));
  renderSection("sec-context", configCache.filter(f => CTX_KEYS.includes(f.key)));

  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.remove("active");
    el.onclick = () => switchTab(el.dataset.section);
  });
  document.querySelector(".nav-item").classList.add("active");
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec-llm").classList.add("active");
}

function switchTab(id) {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.querySelector(`[data-section="${id}"]`).classList.add("active");
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec-"+id).classList.add("active");
}

function renderSection(secId, fields) {
  const el = document.getElementById(secId);
  el.innerHTML = fields.map(f => {
    let val = f.value || "";
    let ph = f.key.includes("KEY") ? "sk-..." : "";
    if (f.key === "OPENAI_BASE_URL") ph = "https://api.openai.com/v1";
    if (f.key === "OPENAI_MODEL") ph = "gpt-4o-mini";
    return `<div class="field">
      <label>${f.label} <span style="color:var(--muted);font-weight:400">${f.key}</span></label>
      <input type="${f.type}" data-key="${f.key}" value="${escapeHtml(val)}" placeholder="${ph}">
      ${f.key.includes("WINDOW")||f.key.includes("MAX")||f.key.includes("TRIM")||f.key.includes("SUMMARY") ? '<div class="hint">留空则自动匹配模型窗口</div>' : ''}
    </div>`;
  }).join("");
}

function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

async function saveSettings() {
  const fields = [];
  document.querySelectorAll(".modal-content input").forEach(inp => {
    fields.push({ key: inp.dataset.key, value: inp.value });
  });
  await fetch(API + "/config", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ fields }),
  });
  closeSettings();
  toast("已保存。请重启应用使配置生效。");
}

function closeSettings() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

init();
</script>
</body>
</html>
