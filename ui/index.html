<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Uki</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --input-bg: #16213e;
    --accent: #e94560;
    --text: #d0d0e0;
    --muted: #6a6a8a;
    --user-bubble: #e94560;
    --reply: #4caf50;
    --think: #00bcd4;
    --tool: #ffc107;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font: 13px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
    background: var(--bg);
    color: var(--text);
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  header {
    padding:14px 24px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid #222; -webkit-app-region:drag; background:var(--card);
  }
  header h1 { font-size:16px; color:var(--accent); font-weight:700; letter-spacing: 1px; }
  header .status { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  header .dot { width:6px; height:6px; border-radius:50%; background:var(--reply); }

  #chat {
    flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px;
  }
  .msg { max-width:85%; padding:10px 14px; border-radius:12px; line-height:1.6; word-break:break-word; animation: fadeIn .2s; }
  .msg.user { align-self:flex-end; background:var(--user-bubble); color:#fff; border-bottom-right-radius:3px; }
  .msg.think { align-self:flex-start; background:#162447; color:var(--think); font-size:12px; border-bottom-left-radius:3px; }
  .msg.tool  { align-self:flex-start; background:#1a1a1a; color:var(--tool); font-size:11px; padding:6px 10px; }
  .msg.reply { align-self:flex-start; background:#1b3a2a; color:var(--reply); border-bottom-left-radius:3px; }
  .msg.info  { align-self:center; color:var(--muted); font-size:11px; background:none; padding:2px 0; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .typing { color:var(--muted); font-style:italic; font-size:12px; }

  footer {
    padding:12px 24px; display:flex; gap:10px;
    border-top:1px solid #222; background:var(--card);
  }
  #input {
    flex:1; padding:10px 16px; background:var(--input-bg); border:1px solid #2a2a4a;
    border-radius:10px; color:var(--text); font-size:13px; outline:none; transition:border .2s;
  }
  #input:focus { border-color:var(--accent); }
  #input::placeholder { color:#444; }
  #send {
    padding:10px 22px; background:var(--accent); color:#fff; border:none;
    border-radius:10px; font-size:13px; cursor:pointer; transition:opacity .2s; font-weight:600;
  }
  #send:hover { opacity:.85; }
  #send:disabled { opacity:.35; cursor:default; }
</style>
</head>
<body>
<header>
  <h1>Uki</h1>
  <div class="status"><span class="dot"></span><span id="model">连接中...</span></div>
</header>
<div id="chat"></div>
<footer>
  <input id="input" placeholder="输入消息..." autofocus>
  <button id="send" onclick="send()">发送</button>
</footer>

<script>
const API = "http://127.0.0.1:8765";
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("send");
let running = false;

async function init() {
  try {
    const r = await fetch(API + "/health");
    const d = await r.json();
    document.getElementById("model").textContent = d.model;
  } catch(e) {
    document.getElementById("model").textContent = "等待后端...";
    setTimeout(init, 1000);
  }
}

function bubble(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const msg = input.value.trim();
  if (!msg || running) return;
  input.value = "";
  running = true;
  btn.disabled = true;

  bubble(msg, "user");

  try {
    const res = await fetch(API + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const text = JSON.parse(line.slice(6));
        if (!text.trim()) continue;
        bubble(text, msgClass(text));
      }
    }
  } catch (e) {
    bubble("连接失败: " + e.message, "info");
  }

  running = false;
  btn.disabled = false;
  input.focus();
}

function msgClass(text) {
  if (text.includes("思考") || text.includes("💭")) return "think";
  if (text.includes("🔧") || text.includes("调用工具")) return "tool";
  if (text.includes("✨") || text.startsWith("Uki:")) return "reply";
  if (text.includes("📋")) return "info";
  return "info";
}

input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
init();
</script>
</body>
</html>
